# Extends k3s' bundled Traefik (deployed by its helm-controller) with a Let's
# Encrypt certificate resolver and a global HTTP→HTTPS redirect — the same model
# the old docker-compose Traefik used (HTTP-01 challenge on :80), now declarative.
# The helm-controller merges this into the chart values and reconciles Traefik.
apiVersion: helm.cattle.io/v1
kind: HelmChartConfig
metadata:
  name: traefik
  namespace: kube-system
spec:
  valuesContent: |-
    # Allow an IngressRoute in one namespace to reference a Service/Middleware in
    # another — the admin IngressRoute (ns web) routes /grafana to the Grafana
    # Service in ns monitoring.
    providers:
      kubernetesCRD:
        allowCrossNamespace: true
    # Expose the LoadBalancer service on both IP families so servicelb binds
    # :80/:443 on IPv4 *and* IPv6 — required for Let's Encrypt HTTP-01 over the
    # AAAA record. (Needs the cluster installed dual-stack; see bootstrap.sh.)
    service:
      ipFamilyPolicy: PreferDualStack
      ipFamilies:
        - IPv4
        - IPv6
    # Persist the ACME store so certs survive Traefik restarts (local-path PVC).
    # Traefik creates /data/acme.json (0600) itself; fsGroup makes /data writable.
    persistence:
      enabled: true
      accessMode: ReadWriteOnce
      size: 128Mi
      path: /data
    certificatesResolvers:
      letsencrypt:
        acme:
          email: ${ACME_EMAIL}
          storage: /data/acme.json
          httpChallenge:
            entryPoint: web
    # Redirect every :80 request to :443 (ACME challenges are still served first).
    ports:
      web:
        redirectTo:
          port: websecure
    # Access logs in JSON on stdout → captured by Promtail into Loki. This is our
    # request-tracing layer: every request in/out through the proxy is recorded
    # (method, host, path, status, duration, backend). Query in Grafana with:
    #   {namespace="kube-system", pod=~"traefik.*"} | json
    logs:
      general:
        level: INFO
      access:
        enabled: true
        format: json
        # Also log the Upgrade request header so WebSocket handshakes are
        # unambiguously identifiable in Loki (field `request_Upgrade=websocket`),
        # independent of the logged status code.
        fields:
          headers:
            defaultmode: drop
            names:
              Upgrade: keep
