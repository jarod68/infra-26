# HSTS response header, applied to every route (Traefik v3 CRD).
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: hsts
  namespace: web
spec:
  headers:
    stsSeconds: 31536000
    stsIncludeSubdomains: true
    stsPreload: true
    forceSTSHeader: true
---
# getaround lives under app.holtz.fr/getaround. The app itself serves from /:
# 1) …/getaround (no slash) is redirected to …/getaround/ so the page's
#    relative asset/API URLs resolve under the prefix;
# 2) the prefix is then stripped before the request reaches the app.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: getaround-slash
  namespace: web
spec:
  redirectRegex:
    regex: "^https://([^/]+)/getaround$"
    replacement: "https://${1}/getaround/"
    permanent: true
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: getaround-strip
  namespace: web
spec:
  stripPrefix:
    prefixes: ["/getaround"]
---
# Whole /getaround path is private — credentials generated by deploy.sh
# (secrets getaround-basic-auth{,-plain}; print with `make password`).
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: getaround-auth
  namespace: web
spec:
  basicAuth:
    secret: getaround-basic-auth
    realm: "getaround"
    removeHeader: true
