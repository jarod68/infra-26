apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data
  namespace: web
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: web
spec:
  replicas: 1
  strategy:
    type: Recreate          # single RWO volume — never run two pods at once
  selector:
    matchLabels: { app: postgres }
  template:
    metadata:
      labels: { app: postgres }
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            - { name: POSTGRES_DB, value: photobook }
            - { name: POSTGRES_USER, value: photobook }
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef: { name: app-secrets, key: POSTGRES_PASSWORD }
            # Keep data in a sub-dir so initdb owns a clean directory on the PVC.
            - { name: PGDATA, value: /var/lib/postgresql/data/pgdata }
          ports:
            - containerPort: 5432
          volumeMounts:
            - { name: data, mountPath: /var/lib/postgresql/data }
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "photobook", "-d", "photobook"]
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 12
          resources:
            requests: { cpu: 50m, memory: 128Mi }
      volumes:
        - name: data
          persistentVolumeClaim: { claimName: postgres-data }
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: web
spec:
  selector: { app: postgres }
  ports:
    - port: 5432
      targetPort: 5432
