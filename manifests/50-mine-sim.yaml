apiVersion: v1
kind: PersistentVolumeClaim
metadata: { name: mine-sim-data, namespace: web }
spec:
  accessModes: [ReadWriteOnce]
  resources: { requests: { storage: 1Gi } }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mine-sim
  namespace: web
spec:
  replicas: 1            # in-memory game rooms + local SQLite ⇒ single instance
  strategy:
    type: Recreate
  selector:
    matchLabels: { app: mine-sim }
  template:
    metadata:
      labels: { app: mine-sim }
    spec:
      # Image runs as `node` (uid 1000); fsGroup makes /data (DATA_DIR) writable.
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: mine-sim
          image: ${MINESIM_IMAGE}
          imagePullPolicy: Always
          env:
            - { name: NODE_ENV, value: production }
            - { name: PORT, value: "3200" }
            - { name: DATA_DIR, value: /data }
            - { name: ALLOWED_ORIGINS, value: "https://${PLAY_DOMAIN}" }
            # One worker per host CPU core (1 ⇒ single process). Set by deploy.sh.
            - { name: WORKERS, value: "${MINESIM_WORKERS}" }
          ports:
            - containerPort: 3200
          volumeMounts:
            - { name: data, mountPath: /data }
          readinessProbe:
            tcpSocket: { port: 3200 }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests: { cpu: 50m, memory: 96Mi }
      volumes:
        - name: data
          persistentVolumeClaim: { claimName: mine-sim-data }
---
apiVersion: v1
kind: Service
metadata:
  name: mine-sim
  namespace: web
spec:
  selector: { app: mine-sim }
  ports:
    - port: 3200
      targetPort: 3200
