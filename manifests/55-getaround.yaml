apiVersion: v1
kind: PersistentVolumeClaim
metadata: { name: getaround-data, namespace: web }
spec:
  accessModes: [ReadWriteOnce]
  resources: { requests: { storage: 1Gi } }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: getaround
  namespace: web
spec:
  replicas: 1            # scheduler state + local SQLite ⇒ single instance
  strategy:
    type: Recreate
  selector:
    matchLabels: { app: getaround }
  template:
    metadata:
      labels: { app: getaround }
    spec:
      # Image runs as `node` (uid 1000); fsGroup makes /data (DATA_DIR) writable.
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      # The image is PRIVATE on Docker Hub — regcred-dockerhub is created by
      # deploy.sh from DOCKERHUB_USER / DOCKERHUB_TOKEN in .env.
      imagePullSecrets:
        - name: regcred-dockerhub
      containers:
        - name: getaround
          image: ${GETAROUND_IMAGE}
          imagePullPolicy: Always
          env:
            - { name: NODE_ENV, value: production }
            - { name: PORT, value: "3300" }
            - { name: DATA_DIR, value: /data }
            - { name: TZ, value: Europe/Paris }   # periods are computed in local time
          ports:
            - containerPort: 3300
          volumeMounts:
            - { name: data, mountPath: /data }
          readinessProbe:
            tcpSocket: { port: 3300 }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests: { cpu: 25m, memory: 64Mi }
      volumes:
        - name: data
          persistentVolumeClaim: { claimName: getaround-data }
---
apiVersion: v1
kind: Service
metadata:
  name: getaround
  namespace: web
spec:
  selector: { app: getaround }
  ports:
    - port: 3300
      targetPort: 3300
