# HTTPS routes (Traefik v3 CRD). TLS certs are obtained on demand via the
# `letsencrypt` resolver defined in 10-traefik-acme.yaml. HTTP→HTTPS redirect is
# global (also in 10-…). HSTS is applied per route.

# photo-book — book.holtz.fr
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: photo-book
  namespace: web
spec:
  entryPoints: [websecure]
  routes:
    - match: Host(`${DOMAIN}`)
      kind: Rule
      services:
        - name: photo-book
          port: 3000
      middlewares:
        - name: hsts
  tls:
    certResolver: letsencrypt
---
# adminer — book.holtz.fr/db  (higher priority than the catch-all above)
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: adminer
  namespace: web
spec:
  entryPoints: [websecure]
  routes:
    - match: Host(`${DOMAIN}`) && PathPrefix(`/db`)
      kind: Rule
      priority: 100
      services:
        - name: adminer
          port: 8080
      middlewares:
        - name: hsts
  tls:
    certResolver: letsencrypt
---
# getaround — app.holtz.fr/getaround  (slash redirect + prefix strip, see
# 15-middlewares.yaml; the app serves from / inside the pod)
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: getaround
  namespace: web
spec:
  entryPoints: [websecure]
  routes:
    - match: Host(`${APP_DOMAIN}`) && PathPrefix(`/getaround`)
      kind: Rule
      services:
        - name: getaround
          port: 3300
      middlewares:
        - name: hsts
        - name: getaround-slash
        - name: getaround-auth
        - name: getaround-strip
  tls:
    certResolver: letsencrypt
---
# mine-sim — play.holtz.fr  (WebSocket upgrades pass through transparently)
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: mine-sim
  namespace: web
spec:
  entryPoints: [websecure]
  routes:
    - match: Host(`${PLAY_DOMAIN}`)
      kind: Rule
      services:
        - name: mine-sim
          port: 3200
      middlewares:
        - name: hsts
  tls:
    certResolver: letsencrypt
