# Portainer CE — web UI to manage this k3s cluster.
# Served under https://${ADMIN_DOMAIN}/portainer (see 85-admin-ingress.yaml).
# `--base-url=/portainer` makes Portainer emit all its asset/API URLs under that
# prefix, so Traefik forwards /portainer/* unchanged (NO stripPrefix). Lives in
# the `web` namespace so it can reuse the shared middlewares.
#
# ⚠️ Security: on first visit you MUST set the admin password within a few
# minutes of the pod starting — Portainer locks initial setup after a timeout
# (reopen it with `kubectl -n web rollout restart deploy/portainer`). The
# ClusterRoleBinding grants full cluster-admin, so keep that password strong.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: portainer-sa-clusteradmin
  namespace: web
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: portainer
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: portainer-sa-clusteradmin
    namespace: web
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: portainer-data
  namespace: web
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: portainer
  namespace: web
spec:
  replicas: 1
  strategy:
    type: Recreate          # single RWO volume — never run two pods at once
  selector:
    matchLabels: { app: portainer }
  template:
    metadata:
      labels: { app: portainer }
    spec:
      serviceAccountName: portainer-sa-clusteradmin
      containers:
        - name: portainer
          image: portainer/portainer-ce:lts
          # Serve plain HTTP on :9000 (Traefik terminates TLS) under /portainer.
          args:
            - "--http-enabled"
            - "--base-url=/portainer"
          ports:
            - { name: http, containerPort: 9000 }
          volumeMounts:
            - { name: data, mountPath: /data }
          resources:
            requests: { cpu: 50m, memory: 128Mi }
      volumes:
        - name: data
          persistentVolumeClaim: { claimName: portainer-data }
---
apiVersion: v1
kind: Service
metadata:
  name: portainer
  namespace: web
spec:
  selector: { app: portainer }
  ports:
    - { name: http, port: 9000, targetPort: 9000 }
