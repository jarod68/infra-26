# Portainer CE — web UI to manage this k3s cluster.
# Exposed at https://${PORTAINER_DOMAIN} via Traefik (TLS from the letsencrypt
# resolver). Lives in the `web` namespace so it can reuse the `hsts` middleware.
#
# ⚠️ Security: on first visit you MUST set the admin password within a few
# minutes of the pod starting — Portainer locks initial setup after a timeout
# (restart the deployment to reopen the window: `kubectl -n web rollout restart
# deploy/portainer`). The ClusterRoleBinding below grants Portainer full
# cluster-admin, so keep that password strong.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: portainer-sa-clusteradmin
  namespace: web
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: portainer
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: portainer-sa-clusteradmin
    namespace: web
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: portainer-data
  namespace: web
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: portainer
  namespace: web
spec:
  replicas: 1
  strategy:
    type: Recreate          # single RWO volume — never run two pods at once
  selector:
    matchLabels: { app: portainer }
  template:
    metadata:
      labels: { app: portainer }
    spec:
      serviceAccountName: portainer-sa-clusteradmin
      containers:
        - name: portainer
          image: portainer/portainer-ce:lts
          # Serve plain HTTP on :9000 — Traefik terminates TLS in front of it.
          args: ["--http-enabled"]
          ports:
            - { name: http, containerPort: 9000 }
          volumeMounts:
            - { name: data, mountPath: /data }
          resources:
            requests: { cpu: 50m, memory: 128Mi }
      volumes:
        - name: data
          persistentVolumeClaim: { claimName: portainer-data }
---
apiVersion: v1
kind: Service
metadata:
  name: portainer
  namespace: web
spec:
  selector: { app: portainer }
  ports:
    - { name: http, port: 9000, targetPort: 9000 }
---
# Basic-auth gate in front of Portainer. The password lives in the
# `portainer-basic-auth` Secret (created by deploy.sh, key `users` = apr1 hash).
# removeHeader strips the Authorization header before proxying to Portainer.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: portainer-auth
  namespace: web
spec:
  basicAuth:
    secret: portainer-basic-auth
    realm: "Portainer (admin)"
    removeHeader: true
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: portainer
  namespace: web
spec:
  entryPoints: [websecure]
  routes:
    - match: Host(`${PORTAINER_DOMAIN}`)
      kind: Rule
      services:
        - name: portainer
          port: 9000
      middlewares:
        - name: portainer-auth   # basic-auth first, then HSTS
        - name: hsts
  tls:
    certResolver: letsencrypt
