# Unified admin surface on https://${ADMIN_DOMAIN}:
#   /portainer → Portainer   (Service portainer, ns web)
#   /grafana   → Grafana      (Service grafana, ns monitoring — cross-namespace)
#   /          → redirect to /grafana
#
# Everything sits behind `admin-auth` (Traefik basic-auth, password in
# `make password`) plus the shared `hsts` middleware. The Grafana route reaches
# across namespaces, enabled by providers.kubernetesCRD.allowCrossNamespace in
# 10-traefik-acme.yaml.

# Basic-auth gate. Secret `admin-basic-auth` (key `users`) is created by
# deploy.sh; removeHeader strips Authorization before proxying upstream.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: admin-auth
  namespace: web
spec:
  basicAuth:
    secret: admin-basic-auth
    realm: "admin.holtz.fr"
    removeHeader: true
---
# Bare-host / and empty path → send the user to the Grafana UI.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: admin-root-redirect
  namespace: web
spec:
  redirectRegex:
    regex: "^https://[^/]+/?$"
    replacement: "https://${ADMIN_DOMAIN}/grafana/"
    permanent: false
---
# Portainer serves its routes at root; `--base-url=/portainer` only prefixes the
# asset URLs it emits. So we strip /portainer here before proxying — the browser
# uses /portainer/*, Portainer receives /*.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: portainer-strip
  namespace: web
spec:
  stripPrefix:
    prefixes:
      - /portainer
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: admin
  namespace: web
spec:
  entryPoints: [websecure]
  routes:
    # Portainer — same namespace.
    - match: Host(`${ADMIN_DOMAIN}`) && PathPrefix(`/portainer`)
      kind: Rule
      priority: 20
      services:
        - name: portainer
          port: 9000
      middlewares:
        - name: admin-auth
        - name: portainer-strip
        - name: hsts
    # Grafana — cross-namespace service reference (ns monitoring).
    - match: Host(`${ADMIN_DOMAIN}`) && PathPrefix(`/grafana`)
      kind: Rule
      priority: 20
      services:
        - name: grafana
          namespace: monitoring
          port: 80
      middlewares:
        - name: admin-auth
        - name: hsts
    # Root → redirect to /grafana (service is a placeholder; the middleware
    # responds before the request is proxied).
    - match: Host(`${ADMIN_DOMAIN}`) && Path(`/`)
      kind: Rule
      priority: 10
      services:
        - name: portainer
          port: 9000
      middlewares:
        - name: admin-auth
        - name: admin-root-redirect
  tls:
    certResolver: letsencrypt
